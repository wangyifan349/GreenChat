{% extends "base.html" %}
{% block title %}Change password | GreenChat{% endblock %}
{% block content %}
<!-- Authenticated password update form. -->
<main class="container-fluid app-container py-4">
    <div class="settings-card shadow-sm">
        <div class="mb-4">
            <h1 class="h3 mb-1">Change password</h1>
            <p class="text-muted mb-0">Confirm your current password before choosing a new one.</p>
        </div>
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        {% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label" for="current_password">Current password</label>
                <input class="form-control" id="current_password" name="current_password" type="password" autocomplete="current-password" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="new_password">New password</label>
                <input class="form-control" id="new_password" name="new_password" type="password" autocomplete="new-password" required>
            </div>
            <div class="mb-4">
                <label class="form-label" for="confirm_password">Confirm new password</label>
                <input class="form-control" id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required>
            </div>
            <button class="btn btn-success" type="submit">Update password</button>
        </form>
    </div>
</main>
{% endblock %}
