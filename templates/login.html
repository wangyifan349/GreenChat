{% extends "base.html" %}
{% block title %}Log in | GreenChat{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
<!-- Login form. -->
<div class="auth-shell">
    <div class="auth-card shadow-sm">
        <div class="auth-logo">G</div>
        <h1 class="h3 text-center mb-2">Welcome back</h1>
        <p class="text-muted text-center mb-4">Log in to continue chatting.</p>
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input class="form-control form-control-lg" id="username" name="username" maxlength="32" autocomplete="username" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input class="form-control form-control-lg" id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button class="btn btn-success btn-lg w-100" type="submit">Log in</button>
        </form>
        <p class="text-center mt-4 mb-0">No account? <a href="{{ url_for('register') }}">Register</a></p>
    </div>
</div>
{% endblock %}
