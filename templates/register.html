{% extends "base.html" %}
{% block title %}Register | GreenChat{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
<!-- Registration form. -->
<div class="auth-shell">
    <div class="auth-card shadow-sm">
        <div class="auth-logo">G</div>
        <h1 class="h3 text-center mb-2">Create account</h1>
        <p class="text-muted text-center mb-4">Register a username to start chatting.</p>
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input class="form-control form-control-lg" id="username" name="username" maxlength="32" autocomplete="username" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input class="form-control form-control-lg" id="password" name="password" type="password" autocomplete="new-password" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="confirm_password">Confirm password</label>
                <input class="form-control form-control-lg" id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required>
            </div>
            <button class="btn btn-success btn-lg w-100" type="submit">Register</button>
        </form>
        <p class="text-center mt-4 mb-0">Already registered? <a href="{{ url_for('login') }}">Log in</a></p>
    </div>
</div>
{% endblock %}
